<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pedidos - Cosméticos</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #d81b60; text-align: center; }
        .catalogos { display: grid; grid-template-columns: 1-fr 1-fr; gap: 10px; margin-bottom: 20px; text-align: center; }
        .btn-cat { padding: 10px; background: #eee; border: 1px solid #ddd; text-decoration: none; color: #333; border-radius: 5px; font-size: 14px; }
        .btn-cat:hover { background: #d81b60; color: white; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #25d366; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #128c7e; }
        .brand-section { border-left: 4px solid #d81b60; padding-left: 10px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛍️ Meu Pedido de Beleza</h2>
    <p style="text-align: center;">Consulte os catálogos abaixo e preencha seu pedido:</p>

    <div class="catalogos">
        <a href="https://www.boticario.com.br/catalogo-digital/" target="_blank" class="btn-cat">O Boticário</a>
        <a href="https://www.natura.com.br/c/revista-digital" target="_blank" class="btn-cat">Natura</a>
        <a href="https://www.avon.com.br/folheto-digital" target="_blank" class="btn-cat">Avon</a>
        <a href="https://catalogo.eudora.com.br/" target="_blank" class="btn-cat">Eudora</a>
    </div>

    <form id="formPedido">
        <label>Seu Nome:</label>
        <input type="text" id="nome" required>

        <label>Endereço de Entrega:</label>
        <input type="text" id="endereco" required>

        <label>WhatsApp:</label>
        <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" required>

        <div class="brand-section">
            <label>Produtos Desejados (Nome/Código):</label>
            <textarea id="produtos" rows="4" placeholder="Ex: Batom Eudora Soul, Perfume Malbec..." required></textarea>
        </div>

        <label>Data da Compra:</label>
        <input type="date" id="dataCompra" required>

        <label>Data Prevista para Entrega:</label>
        <input type="date" id="dataEntrega">

        <label>Valor Total (R$):</label>
        <input type="number" id="valorTotal" step="0.01" required>

        <label>Valor da 1ª Parcela / Entrada (R$):</label>
        <input type="number" id="primeiraParcela" step="0.01">

        <label>Valor Restante (R$):</label>
        <input type="number" id="valorRestante" step="0.01" readonly>

        <button type="button" onclick="enviarWhatsApp()">🚀 Enviar Pedido via WhatsApp</button>
    </form>
</div>

<script>
    // Cálculo automático do valor restante
    const totalInput = document.getElementById('valorTotal');
    const entradaInput = document.getElementById('primeiraParcela');
    const restanteInput = document.getElementById('valorRestante');

    function calcularRestante() {
        const total = parseFloat(totalInput.value) || 0;
        const entrada = parseFloat(entradaInput.value) || 0;
        restanteInput.value = (total - entrada).toFixed(2);
    }

    totalInput.addEventListener('input', calcularRestante);
    entradaInput.addEventListener('input', calcularRestante);

    function enviarWhatsApp() {
        const seuNumero = "5583988414799"; // COLOQUE SEU NÚMERO AQUI (DDI + DDD + Numero)
        
        const nome = document.getElementById('nome').value;
        const endereco = document.getElementById('endereco').value;
        const zap = document.getElementById('whatsapp').value;
        const produtos = document.getElementById('produtos').value;
        const dataC = document.getElementById('dataCompra').value;
        const dataE = document.getElementById('dataEntrega').value;
        const total = document.getElementById('valorTotal').value;
        const entrada = document.getElementById('primeiraParcela').value;
        const restante = document.getElementById('valorRestante').value;

        const mensagem = `*NOVO PEDIDO DE COSMÉTICOS*%0A%0A` +
            `*Cliente:* ${nome}%0A` +
            `*Endereço:* ${endereco}%0A` +
            `*WhatsApp:* ${zap}%0A%0A` +
            `*Produtos:*%0A${produtos}%0A%0A` +
            `*Data da Compra:* ${dataC}%0A` +
            `*Data da Entrega:* ${dataE}%0A` +
            `*Valor Total:* R$ ${total}%0A` +
            `*Entrada:* R$ ${entrada}%0A` +
            `*Valor Restante:* R$ ${restante}`;

        const url = `https://api.whatsapp.com/send?phone=${seuNumero}&text=${mensagem}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
